spring:
  application:
    name: bo-ai-agent
  profiles:
    active: local
#    数据库配置 ##########
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
server:
    port: 8123
    servlet:
      context-path: /api
# springdoc-openapi 接口文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xinhuo.boaiagent.controller
# knife4j 增强配置， 不增强可不配
knife4j:
  enable: true
  setting:
    language: zh_cn