spring:
  application:
    name: bo-ai-agent
  datasource:
    # 本地开发默认连接本机 PostgreSQL。生产环境请使用环境变量覆盖，不要提交真实账号密码。
    url: ${DB_URL:jdbc:postgresql://localhost:5432/policy_data}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
  ai:
    # DashScope / 通义千问
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen3-max-2026-01-23}
    # DeepSeek
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}

# 智谱 AI 配置
bigmodel:
  api-key: ${BIGMODEL_API_KEY:}
